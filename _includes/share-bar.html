<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>ata</title>
    <link href="https://fonts.googleapis.com/css?family=Open+Sans" rel="stylesheet">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.3.1/css/all.css" integrity="sha384-mzrmE5qonljUremFsqc01SB46JvROS7bZs3IO2EmfFsd15uHvIt+Y8vEf7N7fWAU" crossorigin="anonymous">
</head>
<style>
    #facebook {
        background: transparent;
padding: 5px 12px;        font-family: 'Open Sans', sans-serif;
        border: 1px solid #3B5998;
        border-radius: 8px;
        color: #3B5998;
        text-align: left;
    }

    #facebook:hover {
        color: white;
        background: #3B5998;

    }

    #twitter {
        background: transparent;
padding: 5px 12px;
        font-family: 'Open Sans', sans-serif;
        border: 1px solid #1da1f2;
        border-radius: 8px;
        color: #1da1f2;
        text-align: left;
    }

    #twitter:hover {
        color: white;
        background: #1da1f2;

    }

    #reddit {
        background: transparent;
padding: 5px 12px;
        font-family: 'Open Sans', sans-serif;
        border: 1px solid #ff4500;
        border-radius: 8px;
        color: #ff4500;
        text-align: left;
    }

    #reddit:hover {
        color: white;
        background: #ff4500;

    }

    #in {
        background: transparent;
        padding: 5px 12px;
        font-family: 'Open Sans', sans-serif;
        border: 1px solid #0077B5;
        border-radius: 8px;
        color: #0077B5;
        text-align: left;
    }

    #in:hover {
        color: white;
        background: #0077B5;

    }

    a {
        text-decoration: none;

    }

</style>

<body>
    <h5>Share this post:</h5>
    <a id="facebook" href="https://www.facebook.com/sharer/sharer.php?u={{ site.url }}{{ site.baseurl }}{{ page.url }}" onclick="window.open(this.href, 'pop-up', 'left=20,top=20,width=500,height=500,toolbar=1,resizable=0'); return false;" title="Share on Facebook"><i class="fab fa-facebook-f"></i> Facebook</a>

    <a id="twitter" href="https://twitter.com/intent/tweet?text={{ page.title }}&url={{ site.url }}{{ site.baseurl }}{{ page.url }}" onclick="window.open(this.href, 'pop-up', 'left=20,top=20,width=500,height=500,toolbar=1,resizable=0'); return false;" title="Share on Twitter"><i class="fab fa-twitter"></i> Twitter</a>

     <a id="reddit" href="http://www.reddit.com/submit?url={{ site.url }}{{ site.baseurl }}{{ page.url }}" onclick="window.open(this.href, 'pop-up', 'left=20,top=20,width=900,height=500,toolbar=1,resizable=0'); return false;" title="Share on Reddit"><i class="fab fa-reddit-alien"></i> Reddit</a>

    <a id="in" href="https://www.linkedin.com/shareArticle?mini=true&url={{ site.url }}{{ site.baseurl }}{{ page.url }}&title={{ page.title }}&summary={{ page.description }}&source={{ site.title }}" onclick="window.open(this.href, 'pop-up', 'left=20,top=20,width=500,height=500,toolbar=1,resizable=0'); return false;" title="Share on LinkedIn"><i class="fab fa-linkedin-in"></i> LinkedIn</a>

</body>

</html>
