{% assign share_url = site.url | append: site.baseurl | append: page.url %}
{% assign share_title = page.title | uri_escape %}
<div class="share-bar">
  <span class="share-label">Share</span>
  <a href="https://twitter.com/intent/tweet?text={{ share_title }}&url={{ share_url }}" target="_blank" rel="noopener">X / Twitter</a>
  <a href="https://news.ycombinator.com/submitlink?u={{ share_url }}&t={{ share_title }}" target="_blank" rel="noopener">Hacker News</a>
  <a href="https://www.reddit.com/submit?url={{ share_url }}&title={{ share_title }}" target="_blank" rel="noopener">Reddit</a>
  <a href="https://www.linkedin.com/sharing/share-offsite/?url={{ share_url }}" target="_blank" rel="noopener">LinkedIn</a>
</div>
