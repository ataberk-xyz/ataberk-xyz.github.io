<div class="post-meta">
  <time class="post-date" datetime="{{ include.post.date | date_to_xmlschema }}">{{ include.post.date | date: "%B %-d, %Y" }}</time>
  {% if include.post.categories.size > 0 %}
    <span class="post-cats">
      {% for category in include.post.categories %}
        <a class="cat" href="{{ site.baseurl }}/categories#{{ category | slugify }}">{{ category }}</a>
      {% endfor %}
    </span>
  {% endif %}
</div>
