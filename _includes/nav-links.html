<nav class="site-nav">
  <a class="nav-link{% if page.url == '/' %} active{% endif %}" href="{{ site.baseurl }}/">Home</a>
  {% comment %} Pages flagged sidebar_link: true (About, Categories) {% endcomment %}
  {% assign nav_pages = site.pages | where: "sidebar_link", true | sort: "title" %}
  {% for node in nav_pages %}
    <a class="nav-link{% if page.url == node.url %} active{% endif %}" href="{{ site.baseurl }}{{ node.url }}">{{ node.title }}</a>
  {% endfor %}
</nav>
